<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Interaktives OT-Security-Werkzeug: erzeugt ein anbieterneutrales, gewichtetes Anforderungsprofil für sichere OT-Fernzugriffslösungen mit Normverweisen (IEC 62443, ISO 27001, NIST CSF, NIS2). Läuft vollständig lokal im Browser.">

<title>OT-Fernzugriffs-Kriterienkompass · Companion zum Buch</title>
<style>
/* Lokale Schriften — kein Abruf bei Google Fonts (vgl. LG München I, 3 O 17493/20) · SIL OFL 1.1 */
@font-face{font-family:'Fraunces';src:url('fonts/fraunces-latin-opsz-normal.woff2') format('woff2-variations'),url('fonts/fraunces-latin-opsz-normal.woff2') format('woff2');font-weight:100 900;font-style:normal;font-display:swap;}
@font-face{font-family:'JetBrains Mono';src:url('fonts/jetbrains-mono-latin-wght-normal.woff2') format('woff2-variations'),url('fonts/jetbrains-mono-latin-wght-normal.woff2') format('woff2');font-weight:100 800;font-style:normal;font-display:swap;}
:root{--red:#2240c4;--red-soft:#dfe4fa;--ink:#181840;--paper:#f5f6fb;--line:#d8dcef;--muted:#5d6184;
--ok:#1d8a5f;--teil:#b97e0a;--offen:#d6246e;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'JetBrains Mono',monospace;background:var(--paper);color:var(--ink);line-height:1.5;
background-image:radial-gradient(var(--line) .5px,transparent .5px);background-size:22px 22px;}
.wrap{max-width:1180px;margin:0 auto;padding:38px 20px 80px;}
header{border-bottom:3px solid var(--ink);padding-bottom:18px;margin-bottom:18px;position:relative;}
.kicker{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--red);font-weight:600;}
h1{font-family:'Fraunces',serif;font-weight:800;font-size:clamp(24px,4.2vw,40px);line-height:1.05;margin:8px 0 10px;}
.sub{font-size:13px;color:var(--muted);max-width:880px;}
.sig{color:var(--red);font-weight:600;}
.ref{font-size:11px;color:var(--muted);font-style:italic;margin-top:6px;}
h2{font-family:'Fraunces',serif;font-size:20px;margin:26px 0 6px;}
.note{font-size:12px;color:var(--muted);margin-bottom:10px;max-width:880px;}
.btn{font-family:inherit;font-size:12px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;
padding:10px 15px;border:1px solid var(--ink);background:var(--ink);color:#fff;cursor:pointer;transition:.15s;}
.btn.ghost{background:transparent;color:var(--ink);} .btn:hover{background:var(--red);border-color:var(--red);color:#fff;}
.btn.sm{padding:5px 9px;font-size:10.5px;}
.toolbar{display:flex;gap:9px;flex-wrap:wrap;margin:24px 0 0;align-items:center;}
.warn{background:#fff7e6;border:1px solid #b97e0a;color:#7a5306;font-size:11.5px;padding:9px 12px;margin:10px 0;}
footer{margin-top:34px;border-top:1px solid var(--line);padding-top:15px;font-size:11px;color:var(--muted);line-height:1.7;}
.langsw{position:absolute;top:0;right:0;display:flex;gap:0;border:1px solid var(--ink);}
.langsw button{font-family:inherit;font-size:11px;font-weight:600;padding:5px 11px;border:0;background:transparent;color:var(--ink);cursor:pointer;letter-spacing:1px;}
.langsw button.on{background:var(--ink);color:#fff;}

/* Kontext */
.werkbar{display:flex;gap:14px;flex-wrap:wrap;align-items:center;background:#fff;border:1px solid var(--ink);padding:10px 14px;margin:12px 0;}
.werkbar label{font-size:10px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);font-weight:600;}
.werkbar input{border:1px solid var(--line);background:var(--paper);font-family:inherit;font-size:12px;padding:4px 6px;}
.werkbar input.w{min-width:240px;}
.q{background:#fff;border:1px solid var(--line);padding:10px 14px;margin:9px 0;}
.q .qt{font-size:12px;font-weight:600;margin-bottom:7px;}
.q .qt b{color:var(--red);}
.opts{display:flex;flex-wrap:wrap;gap:6px;}
.opt{font-size:11.5px;padding:5px 10px;border:1px solid var(--line);background:var(--paper);cursor:pointer;transition:.12s;}
.opt:hover{border-color:var(--ink);}
.opt.on{background:var(--ink);color:#fff;border-color:var(--ink);}

/* Profil-Tabelle */
.colsw{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;margin:10px 0;align-items:center;}
.colsw label{display:flex;gap:5px;align-items:center;cursor:pointer;}
table{width:100%;border-collapse:collapse;background:#fff;font-size:11.5px;}
th{font-size:10px;letter-spacing:1px;text-transform:uppercase;text-align:left;border-bottom:2px solid var(--ink);padding:7px 8px;background:#fff;}
td{border-bottom:1px solid var(--line);padding:7px 8px;vertical-align:top;}
.tblwrap{overflow-x:auto;border:1px solid var(--ink);background:#fff;}
.lvl{display:inline-block;font-size:10px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;padding:2px 8px;color:#fff;}
.lvl.muss{background:var(--offen);} .lvl.soll{background:var(--teil);} .lvl.opt{background:var(--muted);}
.crit-n{font-weight:600;} .crit-d{font-size:10.5px;color:var(--muted);margin-top:2px;}
.why{font-size:10.5px;color:var(--muted);}
.std{font-size:10.5px;white-space:nowrap;}
.opcrit{font-style:italic;color:var(--muted);}

/* Kandidaten */
.candbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:10px 0;}
.candbar input{border:1px solid var(--line);background:#fff;font-family:inherit;font-size:12px;padding:6px 8px;min-width:220px;}
.tri{font-family:inherit;font-size:11px;font-weight:600;width:34px;padding:3px 0;border:1px solid var(--line);background:var(--paper);cursor:pointer;}
.tri.y{background:var(--ok);color:#fff;border-color:var(--ok);}
.tri.p{background:var(--teil);color:#fff;border-color:var(--teil);}
.tri.n{background:var(--offen);color:#fff;border-color:var(--offen);}
.candhead{display:flex;flex-direction:column;gap:3px;}
.candhead .del{font-size:9px;color:var(--muted);cursor:pointer;text-decoration:underline;background:none;border:0;font-family:inherit;}
.score{font-size:11px;}
.score b{font-size:14px;}
.ko{color:var(--offen);font-weight:600;font-size:10.5px;}
.fit{color:var(--ok);font-weight:600;font-size:10.5px;}
.gaps{font-size:10px;color:var(--muted);}

.archwrap{background:#fff;border:1px solid var(--ink);padding:14px;margin:12px 0;overflow-x:auto;}
.archwrap svg{display:block;margin:0 auto;max-width:100%;height:auto;}
@media print{
 body{background:none;} .noprint{display:none !important;}
 .tblwrap{border:1px solid #000;overflow:visible;}
 .opt{border:1px solid #999;} .opt.on{background:#000;color:#fff;}
}

/* ================= Reihen-Design v2 (Buchcover) ================= */
header.sf-cover{position:relative;overflow:hidden;background:#0a0a33;border-bottom:0;padding:0;margin:0;}
.sf-cover svg.plx{position:absolute;inset:0;width:100%;height:100%;}
.sf-cover-in{position:relative;max-width:1180px;margin:0 auto;padding:46px 20px 34px;}
.sf-cover .kicker{color:#41cdf4;}
.sf-cover h1{color:#fff;text-shadow:0 1px 14px rgba(6,6,31,.55);}
.sf-cover .sub{color:#ccd1f2;}
.sf-cover .sig{color:#ff5fa8;}
.sf-cover .ref{color:#9aa0d6;}
.sf-cover .langsw{position:absolute;top:18px;right:20px;border:1px solid rgba(232,234,255,.45);}
.sf-cover .langsw button{color:#e8eaff;}
.sf-cover .langsw button.on{background:#e8eaff;color:#10104a;}
.sf-rule{height:4px;background:linear-gradient(90deg,#d6246e,#7a5cff 35%,#41cdf4 72%,#2fe39b);}
.wrap{padding-top:26px;}
.sf-glance{background:#fff;border:1px solid var(--line);border-left:4px solid var(--red);padding:16px 18px 8px;margin:6px 0 20px;}
.sf-glh{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--red);font-weight:600;margin-bottom:8px;}
.sf-glg{display:grid;grid-template-columns:1fr;margin:0;}
.sf-glg>div{display:grid;grid-template-columns:92px 1fr;gap:12px;padding:7px 0;border-top:1px dashed var(--line);}
.sf-glg>div:first-child{border-top:0;}
.sf-glg dt{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:600;padding-top:2px;}
.sf-glg dd{font-size:12.5px;margin:0;line-height:1.55;}
.sf-legal{margin-top:30px;border-top:1px solid var(--line);padding-top:14px;font-size:10.5px;color:var(--muted);line-height:1.65;max-width:980px;}
.sf-legal a{color:var(--muted);}
.sf-footband{position:relative;overflow:hidden;background:#0a0a33;margin-top:42px;}
.sf-footband svg.plx{position:absolute;inset:0;width:100%;height:100%;opacity:.9;}
.sf-foot-in{position:relative;max-width:1180px;margin:0 auto;padding:26px 20px 30px;}
.sf-foot-in footer{margin:0;border:0;padding:0;font-size:11px;color:#c7cbee;line-height:1.7;}
.sf-foot-in footer b{color:#fff;}
.sf-foot-in footer a{color:#9fd9f6;}
.sf-colo{margin-top:14px;padding-top:12px;border-top:1px solid rgba(199,203,238,.28);font-size:10.5px;color:#9aa0d6;line-height:1.9;}
.sf-colo a{color:#c7cbee;}
.sf-printhead{display:none;}
@keyframes sfPulse{0%,100%{opacity:.55}50%{opacity:1}}
.plx .ndp{animation:sfPulse 5s ease-in-out infinite;}
@media (prefers-reduced-motion:reduce){.plx .ndp{animation:none;}}
:focus-visible{outline:2px solid var(--red);outline-offset:2px;}
@media print{
 .noprint,header.sf-cover,.sf-rule,.sf-glance,.sf-legal,.sf-footband{display:none!important}
 .sf-printhead{display:block;text-align:center;font-size:10px;color:#000;margin-bottom:6px;}
}
@media (max-width:620px){
 .sf-cover-in{padding:40px 16px 26px;}
 .sf-glg>div{grid-template-columns:1fr;gap:2px;}
 .sf-cover .langsw{top:12px;right:12px;}
}
</style>
</head>

  de:{n:"Betriebsmodell & Datenhoheit",d:"On-Premise-Option bzw. Hosting-Region und Auftragsverarbeitung entsprechen den eigenen Souver\u00E4nit\u00E4ts- und Vertragsvorgaben."},
  en:{n:"Deployment model & data sovereignty",d:"On-premise option or hosting region and data processing terms match the organisation's sovereignty and contractual requirements."}}
];

/* ================= Fragen ================= */
const QUESTIONS=[
 {key:"reg",de:{q:"Regulatorischer Status der Anlage?",o:["NIS2 wesentlich / DE-KRITIS","NIS2 wichtig","USA: kritische Infrastruktur","Keine / unklar"]},
            en:{q:"Regulatory status of the site?",o:["NIS2 essential / DE-KRITIS","NIS2 important","US critical infrastructure","None / unclear"]}},
 {key:"third",de:{q:"Wer greift zu?",o:["Nur internes Personal","Nur Externe (OEM/Integrator)","Gemischt intern + extern"]},
              en:{q:"Who accesses?",o:["Internal staff only","Third parties only (OEM/integrator)","Mixed internal + external"]}},
 {key:"proto",de:{q:"Industrieprotokolle direkt im Zugriffspfad (Modbus, DNP3, PROFINET, OPC UA \u2026)?",o:["Ja","Nein, nur RDP/SSH auf Jump-Ebene","Unklar"]},
              en:{q:"Industrial protocols directly in the access path (Modbus, DNP3, PROFINET, OPC UA \u2026)?",o:["Yes","No, only RDP/SSH at jump level","Unclear"]}},
 {key:"brown",de:{q:"Brownfield-Anteil — Anlagen, auf denen keine Agenten installierbar sind?",o:["Hoch","Gering","Unklar"]},
              en:{q:"Brownfield share — assets where agents cannot be installed?",o:["High","Low","Unclear"]}},
 {key:"avail",de:{q:"Verf\u00FCgbarkeitsanforderung der Produktion?",o:["24/7 — Stillstand kritisch","Wartungsfenster m\u00F6glich"]},
              en:{q:"Availability requirement of production?",o:["24/7 — downtime critical","Maintenance windows possible"]}},
 {key:"cloud",de:{q:"Cloud-Betrieb der Zugriffsl\u00F6sung zul\u00E4ssig?",o:["Nur On-Premise","Hybrid","Cloud zul\u00E4ssig"]},
              en:{q:"Is cloud operation of the access solution permissible?",o:["On-premise only","Hybrid","Cloud permissible"]}},
 {key:"sl",de:{q:"Ziel-Security-Level der betroffenen Zone (IEC 62443)?",o:["SL 1","SL 2","SL 3\u20134","Nicht festgelegt"]},
           en:{q:"Target security level of the affected zone (IEC 62443)?",o:["SL 1","SL 2","SL 3\u20134","Not defined"]}}
];

/* ================= Engine ================= */
/* Stufen: 0=Optional 1=Soll 2=Muss */
const BASE={uniqueId:2,mfa:2,approval:1,jit:1,vault:0,broker:1,recording:1,liveTerm:1,fourEyes:0,anomaly:0,protoAware:0,breakGlass:1,agentless:0,sovereignty:0};

const RULES=[
 {when:s=>s.reg===0,up:{jit:2,approval:2,recording:2,broker:2,breakGlass:2,liveTerm:2,vault:1,anomaly:1},
  de:"NIS2-wesentlich/KRITIS",en:"NIS2 essential/KRITIS"},
 {when:s=>s.reg===1,up:{jit:2,approval:2,broker:2,recording:1,anomaly:1},
  de:"NIS2-wichtig",en:"NIS2 important"},
 {when:s=>s.reg===2,up:{jit:2,approval:2,broker:2,recording:1,anomaly:1},
  de:"US-KRITIS-Kontext (SP 800-82r3)",en:"US critical-infrastructure context (SP 800-82r3)"},
 {when:s=>s.third===1||s.third===2,up:{vault:2,recording:1,fourEyes:1,jit:2},
  de:"externe Dienstleister im Zugriff",en:"third-party access"},
 {when:s=>s.proto===0,up:{protoAware:2,anomaly:1},
  de:"Industrieprotokolle im Zugriffspfad",en:"industrial protocols in the access path"},
 {when:s=>s.proto===2,up:{protoAware:1},
  de:"Protokoll-Lage ungekl\u00E4rt",en:"protocol exposure unclear"},
 {when:s=>s.brown===0,up:{agentless:2},
  de:"hoher Brownfield-Anteil",en:"high brownfield share"},
 {when:s=>s.brown===2,up:{agentless:1},
  de:"Brownfield-Lage ungekl\u00E4rt",en:"brownfield exposure unclear"},
 {when:s=>s.avail===0,up:{breakGlass:2,liveTerm:1},
  de:"24/7-Verf\u00FCgbarkeit",en:"24/7 availability"},
 {when:s=>s.cloud===0,up:{sovereignty:2},
  de:"On-Premise-Vorgabe",en:"on-premise mandate"},
 {when:s=>s.cloud===1,up:{sovereignty:1},
  de:"Hybrid-Vorgabe",en:"hybrid mandate"},
 {when:s=>s.sl===1,up:{approval:2},
  de:"Ziel-SL 2",en:"target SL 2"},
 {when:s=>s.sl===2,up:{approval:2,vault:2,liveTerm:2,fourEyes:1,anomaly:1},
  de:"Ziel-SL 3\u20134",en:"target SL 3\u20134"}
];

let lang="de";
let cols={iec:true,iso:true,nist:true,nis2:true};
let state={org:"",datum:todayISO(),ans:{},cands:[]};
QUESTIONS.forEach(q=>state.ans[q.key]=null);

function todayISO(){const d=new Date();return d.toISOString().slice(0,10);}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function t(k){const L=I18N[lang];if(typeof L[k]==="string")return L[k];const p=k.split(".");let o=L;for(const x of p){o=o?.[x];if(o===undefined)return k;}return o;}

function derive(){
 const lvl={...BASE};const why={};
 CRIT.forEach(c=>why[c.id]=[]);
 RULES.forEach(r=>{
   if(r.when(state.ans)!==true)return;
   Object.entries(r.up).forEach(([id,v])=>{
     if(v>lvl[id]){lvl[id]=v;why[id]=[r[lang]];}
     else if(v===lvl[id]&&v>BASE[id]){why[id].push(r[lang]);}
   });
 });
 return {lvl,why};
}

    l1:"erlaubt: vermittelter \u00DCbergang (authentifiziert, protokolliert)",

en:{n1:"External maintenance technician",s1:"from an untrusted network",

    e1a:"MFA, request and",e1b:"just-in-time approval",
    e2a:"protocol whitelist,",e2b:"session recording",
    e3a:"access limited to the",e3b:"requested scope",
    byp:"direct pass-through \u2014 forbidden",
    f1:"No L3 VPN into the OT segment, no direct RDP/SSH from the internet, no",
    f2:"vendor-owned VPN, no consumer remote desktop tools, no standing access.",
    l1:"allowed: brokered transition (authenticated, logged)",
    l2:"forbidden: direct pass-through bypassing broker and DMZ"}};

 const lbl=(y,l1,l2)=>`<text x="915" y="${y}" font-size="21" text-anchor="start" class="ts">${l1}</text>
  <text x="915" y="${y+32}" font-size="21" text-anchor="start" class="ts">${l2}</text>`;
 document.getElementById("archSvg").innerHTML=`
 <svg viewBox="0 0 1240 1090" xmlns="http://www.w3.org/2000/svg" role="img" style="max-width:740px">
 <defs><marker id="kah" refX="8" refY="3" markerWidth="10" markerHeight="10" markerUnits="strokeWidth" orient="auto"><path d="M0 0 8 3 0 6Z" fill="var(--ink)"/></marker></defs>
 <g fill="none" stroke="var(--ink)" stroke-width="2.5">
  ${'<'+'rect/>'===''?'':''}
 </g>
 <g fill="#fff" stroke="var(--ink)" stroke-width="2.5" text-anchor="middle" font-family="inherit">
  ${box(20,a.n1,a.s1)}${box(270,a.n2,a.s2)}${box(520,a.n3,a.s3)}${box(770,a.n4,a.s4)}
 </g>
 <g stroke="var(--ink)" stroke-width="4">
  <line x1="580" y1="140" x2="580" y2="262" marker-end="url(#kah)"/>
  <line x1="580" y1="390" x2="580" y2="512" marker-end="url(#kah)"/>
  <line x1="580" y1="640" x2="580" y2="762" marker-end="url(#kah)"/>
 </g>
 <g stroke="var(--red)" stroke-width="4" stroke-dasharray="4 12" fill="none">
  <line x1="180" y1="80" x2="180" y2="830"/><line x1="180" y1="80" x2="252" y2="80"/><line x1="180" y1="830" x2="252" y2="830"/>
 </g>
 <g text-anchor="middle" font-family="inherit">
  <text x="146" y="470" font-size="21" fill="var(--red)" transform="rotate(-90 146 470)">${a.byp}</text>
 </g>
 <g font-family="inherit" fill="var(--muted)">${lbl(195,a.e1a,a.e1b)}${lbl(445,a.e2a,a.e2b)}${lbl(695,a.e3a,a.e3b)}</g>
 <g font-family="inherit" font-size="21" fill="var(--ink)" text-anchor="start">
  <text x="60" y="950">${a.f1}</text><text x="60" y="986">${a.f2}</text>
 </g>
 <g stroke="var(--ink)" stroke-width="4"><line x1="60" y1="1032" x2="150" y2="1032" marker-end="url(#kah)"/></g>
 <g stroke="var(--red)" stroke-width="4" stroke-dasharray="4 12"><line x1="60" y1="1072" x2="150" y2="1072"/></g>
 <g font-family="inherit" font-size="21" text-anchor="start">
  <text x="170" y="1041" fill="var(--ink)">${a.l1}</text><text x="170" y="1081" fill="var(--red)">${a.l2}</text>
 </g>
 </svg>`;
 const svg=document.querySelector("#archSvg svg");
 svg.querySelectorAll(".tt").forEach(t=>t.setAttribute("fill","var(--ink)"));
 svg.querySelectorAll(".ts").forEach(t=>{if(!t.getAttribute("fill"))t.setAttribute("fill","var(--muted)");});
}

/* ================= Rendering ================= */
function applyI18n(){
 document.documentElement.lang=lang;
 document.querySelectorAll("[data-i18n]").forEach(el=>el.textContent=t(el.dataset.i18n));
 document.querySelectorAll("[data-i18n-html]").forEach(el=>el.innerHTML=t(el.dataset.i18nHtml));
 document.querySelectorAll("[data-i18n-ph]").forEach(el=>el.placeholder=t(el.dataset.i18nPh));
 document.getElementById("foot").innerHTML=t("foot");
 document.getElementById("lde").classList.toggle("on",lang==="de");
 document.getElementById("len").classList.toggle("on",lang==="en");
 document.title=lang==="de"?"OT-Fernzugriffs-Kriterienkompass · Companion zum Buch":"OT Remote Access Criteria Compass · Book companion";
}
function setLang(l){lang=l;applyI18n();renderArch();renderQuestions();renderProfile();renderCands();}

function renderQuestions(){
 let h="";
 QUESTIONS.forEach((q,qi)=>{
   h+=`<div class="q"><div class="qt"><b>${qi+1}</b> \u00B7 ${esc(q[lang].q)}</div><div class="opts">`;
   q[lang].o.forEach((o,oi)=>{
     h+=`<span class="opt ${state.ans[q.key]===oi?'on':''}" onclick="setAns('${q.key}',${oi})">${esc(o)}</span>`;
   });
   h+=`</div></div>`;
 });
 document.getElementById("questions").innerHTML=h;
}
function setAns(k,v){state.ans[k]=state.ans[k]===v?null:v;renderQuestions();renderProfile();renderCands();}

function lvlBadge(v){
 const m=[["opt",t("lvl.opt")],["soll",t("lvl.soll")],["muss",t("lvl.muss")]][v];
 return `<span class="lvl ${m[0]}">${m[1]}</span>`;
}

function renderProfile(){
 const {lvl,why}=derive();
 let h=`<thead><tr><th>${t("col.crit")}</th><th>${t("col.lvl")}</th><th>${t("col.why")}</th>`;
 if(cols.iec)h+=`<th>${t("col.iec")}</th>`;
 if(cols.iso)h+=`<th>${t("col.iso")}</th>`;
 if(cols.nist)h+=`<th>${t("col.nist")}</th>`;
 if(cols.nis2)h+=`<th>${t("col.nis2")}</th>`;
 h+=`</tr></thead><tbody>`;
 const order=[...CRIT].sort((a,b)=>lvl[b.id]-lvl[a.id]);
 order.forEach(c=>{
   const w=why[c.id].length?why[c.id].join(" + "):t("baseWhy");
   h+=`<tr><td><div class="crit-n">${esc(c[lang].n)}</div><div class="crit-d">${esc(c[lang].d)}</div></td>
   <td>${lvlBadge(lvl[c.id])}</td><td class="why">${esc(w)}</td>`;
   const opNote=c.op?` <span class="opcrit">(${t("opcrit")})</span>`:"";
   if(cols.iec)h+=`<td class="std">${c.iec}${c.op&&c.iec==="\u2014"?opNote:""}</td>`;
   if(cols.iso)h+=`<td class="std">${c.iso}</td>`;
   if(cols.nist)h+=`<td class="std">${c.nist}</td>`;
   if(cols.nis2)h+=`<td class="std">${c.nis2}</td>`;
   h+=`</tr>`;
 });
 h+=`</tbody>`;
 document.getElementById("profileTbl").innerHTML=h;
 /* DE-Mitbestimmungshinweis bei Recording-Muss + interner Erfassung */
 const warnId="bvwarn";document.getElementById(warnId)?.remove();
 if(lvl.recording===2&&state.ans.third===2){
   const d=document.createElement("div");d.className="warn";d.id=warnId;d.textContent=t("deNote");
   document.getElementById("profileTbl").parentElement.after(d);
 }
}

/* ================= Kandidaten ================= */
function addCand(){
 const inp=document.getElementById("candName");const n=inp.value.trim();
 if(!n||state.cands.length>=6)return;
 const ratings={};CRIT.forEach(c=>ratings[c.id]=null);
 state.cands.push({name:n,r:ratings});inp.value="";renderCands();
}
function delCand(i){state.cands.splice(i,1);renderCands();}
function cycle(ci,id){
 const cur=state.cands[ci].r[id];
 state.cands[ci].r[id]=cur===null?1:cur===1?0.5:cur===0.5?0:null;
 renderCands();
}
function triLabel(v){return v===1?"\u2713":v===0.5?"~":v===0?"\u2013":"\u00B7";}
function triClass(v){return v===1?"y":v===0.5?"p":v===0?"n":"";}

function renderCands(){
 const wrap=document.getElementById("candWrap"),empty=document.getElementById("candEmpty");
 if(!state.cands.length){wrap.style.display="none";empty.style.display="block";return;}
 wrap.style.display="block";empty.style.display="none";
 const {lvl}=derive();
 const W={2:3,1:2,0:1};
 let h=`<thead><tr><th>${t("col.crit")}</th><th>${t("col.lvl")}</th>`;
 state.cands.forEach((c,i)=>{
   h+=`<th><div class="candhead">${esc(c.name)}<button class="del noprint" onclick="delCand(${i})">${t("cand.del")}</button></div></th>`;
 });
 h+=`</tr></thead><tbody>`;
 const order=[...CRIT].sort((a,b)=>lvl[b.id]-lvl[a.id]);
 order.forEach(cr=>{
   h+=`<tr><td class="crit-n">${esc(cr[lang].n)}</td><td>${lvlBadge(lvl[cr.id])}</td>`;
   state.cands.forEach((c,i)=>{
     const v=c.r[cr.id];
     h+=`<td><button class="tri ${triClass(v)}" onclick="cycle(${i},'${cr.id}')">${triLabel(v)}</button></td>`;
   });
   h+=`</tr>`;
 });
 /* Auswertung */
 h+=`<tr><td colspan="2" style="font-weight:600">${t("cand.cover")}</td>`;
 state.cands.forEach(c=>{
   let got=0,max=0,mussTot=0,mussOk=0;const koList=[];
   CRIT.forEach(cr=>{
     const w=W[lvl[cr.id]];max+=w;
     const v=c.r[cr.id];got+=w*(v===1?1:v===0.5?0.5:0);
     if(lvl[cr.id]===2){mussTot++;
       if(v===1)mussOk++;
       else koList.push(cr[lang].n);}
   });
   const pct=max?Math.round(100*got/max):0;
   let verdict=koList.length
     ?`<div class="ko">${t("cand.ko")}</div><div class="gaps">${koList.map(esc).join("; ")}</div>`
     :`<div class="fit">${t("cand.fit")}</div>`;
   h+=`<td class="score"><b>${pct} %</b><br>${t("cand.mussOk")}: ${mussOk}/${mussTot}${verdict}</td>`;
 });
 h+=`</tr></tbody>`;
 document.getElementById("candTbl").innerHTML=h;
}

/* ================= Export / Persistenz ================= */
function exportCSV(){
 const {lvl,why}=derive();
 const L=I18N[lang];
 const head=[L.col.crit,"",L.col.lvl,L.col.why,L.col.iec,L.col.iso,L.col.nist,L.col.nis2,...state.cands.map(c=>c.name)];
 const lvlTxt=v=>[L.lvl.opt,L.lvl.soll,L.lvl.muss][v];
 const rows=[head];
 const order=[...CRIT].sort((a,b)=>lvl[b.id]-lvl[a.id]);
 order.forEach(c=>{
   rows.push([c[lang].n,c[lang].d,lvlTxt(lvl[c.id]),
     why[c.id].length?why[c.id].join(" + "):L.baseWhy,
     c.iec,c.iso,c.nist,c.nis2,
     ...state.cands.map(cd=>{const v=cd.r[c.id];return v===1?"\u2713":v===0.5?"~":v===0?"\u2013":"";})]);
 });
 const csv=rows.map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(";")).join("\n");
 const blob=new Blob(["\ufeff"+csv],{type:"text/csv"});
 const a=document.createElement("a");a.href=URL.createObjectURL(blob);
 a.download=lang==="de"?"fernzugriffs-anforderungsprofil.csv":"remote-access-requirements-profile.csv";a.click();
}
function saveJSON(){
 const blob=new Blob([JSON.stringify({lang,org:state.org,datum:state.datum,ans:state.ans,cands:state.cands},null,2)],{type:"application/json"});
 const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="ot-fernzugriffs-kriterienkompass.json";a.click();
}
function loadJSON(e){
 const f=e.target.files[0];if(!f)return;const r=new FileReader();
 r.onload=()=>{try{
   const d=JSON.parse(r.result);
   if(d&&d.ans){
     state.org=d.org||"";state.datum=d.datum||todayISO();
     QUESTIONS.forEach(q=>state.ans[q.key]=(q.key in d.ans)?d.ans[q.key]:null);
     state.cands=Array.isArray(d.cands)?d.cands.slice(0,6).map(c=>{
       const ratings={};CRIT.forEach(cr=>ratings[cr.id]=(c.r&&cr.id in c.r)?c.r[cr.id]:null);
       return {name:String(c.name||"?"),r:ratings};
     }):[];
     if(d.lang==="en"||d.lang==="de")lang=d.lang;
     syncFields();applyI18n();renderArch();renderQuestions();renderProfile();renderCands();
   }
 }catch(err){alert(lang==="de"?"Datei nicht lesbar.":"File not readable.");}};
 r.readAsText(f);e.target.value="";
}
function syncFields(){
 const o=document.getElementById("org");if(o)o.value=state.org||"";
 const dt=document.getElementById("datum");if(dt)dt.value=state.datum||"";
}

/* ================= Init ================= */
syncFields();applyI18n();renderArch();renderQuestions();renderProfile();renderCands();
</script>
